<!DOCTYPE html>
<html>
<head>
    <title>AI Hybrid Recommender</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h1 { color: #2c3e50; margin-bottom: 0.5rem; }
        p { color: #7f8c8d; font-size: 0.9rem; margin-bottom: 2rem; }
        input { width: 80%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: #3498db; }
        button { background: #3498db; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2980b9; }
        #results { margin-top: 2rem; text-align: left; background: #f9f9f9; padding: 1rem; border-radius: 8px; display: none; }
        .item-id { background: #e1f5fe; color: #0288d1; padding: 4px 8px; border-radius: 4px; margin: 5px; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>AI Recommender</h1>
        <p>SVD Math + CNN Sentiment Analysis</p>
        
        <input type="number" id="userId" placeholder="Enter User ID (e.g. 0)">
        <br>
        <button onclick="getRecs()">Get Recommendations</button>

        <div id="results">
            <strong style="display:block; margin-bottom:10px;">Top 5 Context-Safe Items:</strong>
            <div id="itemList"></div>
        </div>
    </div>

    <script>
        async function getRecs() {
            const userId = document.getElementById('userId').value;
            const resDiv = document.getElementById('results');
            const listDiv = document.getElementById('itemList');
            
            if (!userId) return alert("Please enter a User ID");

            // Call your Flask API
            const response = await fetch(`/recommend?user_id=${userId}`);
            const data = await response.json();

            if (data.recommendations) {
                listDiv.innerHTML = '';
                data.recommendations.forEach(id => {
                    listDiv.innerHTML += `<span class="item-id">#${id}</span>`;
                });
                resDiv.style.display = 'block';
            } else {
                alert("Error fetching data");
            }
        }
    </script>
</body>
</html>
